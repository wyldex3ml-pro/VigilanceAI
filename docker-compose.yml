services:
  qdrant:
    image: qdrant/qdrant
    container_name: vigilance_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  api:
    build: .
    container_name: vigilance_api
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: vigilance_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: streamlit run dashboard.py --server.address 0.0.0.0 --server.port 8501

  streamer:
    build: .
    container_name: vigilance_streamer
    depends_on:
      - api
      - qdrant
    command: python -m app.streamer